<script>
// 六十四卦 卦爻辭資料（由離線版 v14 擷取，供畫面顯示用）
const GUA_TEXTS = {
        "7,7": {
    "name": "乾",
    "t": "元亨利貞。",
    "xiang": "天行健，君子以自強不息。",
    "l": [
      { "t": "潛龍勿用。", "x": "陽在下也。" },
      { "t": "見龍在田，利見大人。", "x": "德施普也。" },
      { "t": "君子終日乾乾，夕惕若，厲无咎。", "x": "反復道也。" },
      { "t": "或躍在淵，无咎。", "x": "進无咎也。" },
      { "t": "飛龍在天，利見大人。", "x": "大人造也。" },
      { "t": "亢龍有悔。", "x": "盈不可久也。" }
    ]
  },
  "0,0": {
    "name": "坤",
    "t": "元亨，利牝馬之貞。君子有攸往，先迷後得主，利西南得朋，東北喪朋。安貞，吉。",
    "xiang": "地勢坤，君子以厚德載物。",
    "l": [
      { "t": "履霜，堅冰至。", "x": "履霜堅冰，陰始凝也。馴致其道，至堅冰也。" },
      { "t": "直方大，不習无不利。", "x": "六二之動，直以方也。不習无不利，地道光也。" },
      { "t": "含章可貞。或從王事，无成有終。", "x": "含章可貞，以時發也。或從王事，知光大也。" },
      { "t": "括囊，无咎无譽。", "x": "括囊无咎，慎不害也。" },
      { "t": "黃裳，元吉。", "x": "黃裳元吉，文在中也。" },
      { "t": "龍戰于野，其血玄黃。", "x": "龍戰于野，其道窮也。" }
    ]
  },
  "2,1": {
    "name": "屯",
    "t": "元亨，利貞，勿用有攸往，利建侯。",
    "xiang": "雲雷，屯；君子以經綸。",
    "l": [
      { "t": "磐桓，利居貞，利建侯。", "x": "雖磐桓，志行正也。以貴下賤，大得民也。" },
      { "t": "屯如邅如，乘馬班如。匪寇婚媾，女子貞不字，十年乃字。", "x": "六二之難，乘剛也。十年乃字，反常也。" },
      { "t": "即鹿无虞，惟入于林中，君子幾，不如舍，往吝。", "x": "即鹿无虞，以從禽也。君子舍之，往吝窮也。" },
      { "t": "乘馬班如，求婚媾，往吉，无不利。", "x": "求而往，明也。" },
      { "t": "屯其膏，小貞吉，大貞凶。", "x": "屯其膏，施未光也。" },
      { "t": "乘馬班如，泣血漣如。", "x": "泣血漣如，何可長也。" }
    ]
  },
  "4,2": {
    "name": "蒙",
    "t": "亨。匪我求童蒙，童蒙求我。初筮告，再三瀆，瀆則不告。利貞。",
    "xiang": "山下出泉，蒙；君子以果行育德。",
    "l": [
      { "t": "發蒙，利用刑人，用說桎梏，以往吝。", "x": "利用刑人，以正法也。" },
      { "t": "包蒙吉，納婦吉，子克家。", "x": "子克家，剛柔接也。" },
      { "t": "勿用取女，見金夫，不有躬，无攸利。", "x": "勿用取女，行不順也。" },
      { "t": "困蒙，吝。", "x": "困蒙之吝，獨遠實也。" },
      { "t": "童蒙，吉。", "x": "童蒙之吉，順以巽也。" },
      { "t": "擊蒙，不利為寇，利禦寇。", "x": "利用禦寇，上下順也。" }
    ]
  },
  "2,7": {
    "name": "需",
    "t": "有孚，光亨，貞吉。利涉大川。",
    "xiang": "雲上于天，需；君子以飲食宴樂。",
    "l": [
      { "t": "需于郊。利用恆，无咎。", "x": "需于郊，不犯難行也。利用恆，无咎，未失常也。" },
      { "t": "需于沙。小有言，終吉。", "x": "需于沙，衍在中也。雖小有言，以吉終也。" },
      { "t": "需于泥，致寇至。", "x": "需于泥，災在外也。自我致寇，敬慎不敗也。" },
      { "t": "需于血，出自穴。", "x": "需于血，順以聽也。" },
      { "t": "需于酒食，貞吉。", "x": "酒食貞吉，以中正也。" },
      { "t": "入于穴，有不速之客三人來，敬之終吉。", "x": "不速之客來，敬之終吉。雖不當位，未大失也。" }
    ]
  },
  "7,2": {
    "name": "訟",
    "t": "有孚，窒。惕中吉。終凶。利見大人，不利涉大川。",
    "xiang": "天與水違行，訟；君子以作事謀始。",
    "l": [
      { "t": "不永所事，小有言，終吉。", "x": "不永所事，訟不可長也。雖小有言，其辯明也。" },
      { "t": "不克訟，歸而逋，其邑人三百戶，无眚。", "x": "不克訟，歸逋竄也。自下訟上，患至掇也。" },
      { "t": "食舊德，貞厲，終吉，或從王事，无成。", "x": "食舊德，從上吉也。" },
      { "t": "不克訟，復即命，渝安貞，吉。", "x": "復即命，渝安貞，不失也。" },
      { "t": "訟元吉。", "x": "訟元吉，以中正也。" },
      { "t": "或錫之鞶帶，終朝三褫之。", "x": "以訟受服，亦不足敬也。" }
    ]
  },
  "0,2": {
    "name": "師",
    "t": "貞，丈人，吉无咎。",
    "xiang": "地中有水，師；君子以容民畜眾。",
    "l": [
      { "t": "師出以律，否臧凶。", "x": "師出以律，失律凶也。" },
      { "t": "在師中，吉无咎，王三錫命。", "x": "在師中吉，承天寵也。王三錫命，懷萬邦也。" },
      { "t": "師或輿尸，凶。", "x": "師或輿尸，大无功也。" },
      { "t": "師左次，无咎。", "x": "左次无咎，未失常也。" },
      { "t": "田有禽，利執言，无咎。長子帥師，弟子輿尸，貞凶。", "x": "長子帥師，以中行也。弟子輿尸，使不當也。" },
      { "t": "大君有命，開國承家，小人勿用。", "x": "大君有命，以正功也。小人勿用，必亂邦也。" }
    ]
  },
  "2,0": {
    "name": "比",
    "t": "吉。原筮元永貞，无咎。不寧方來，後夫凶。",
    "xiang": "地上有水，比；先王以建萬國，親諸侯。",
    "l": [
      { "t": "有孚比之，无咎。有孚盈缶，終來有他吉。", "x": "比之初六，有他吉也。" },
      { "t": "比之自內，貞吉。", "x": "比之自內，不自失也。" },
      { "t": "比之匪人。", "x": "比之匪人，不亦傷乎。" },
      { "t": "外比之，貞吉。", "x": "外比於賢，以從上也。" },
      { "t": "顯比，王用三驅，失前禽。邑人不誡，吉。", "x": "顯比之吉，位正中也。舍逆取順，失前禽也。邑人不誡，上使中也。" },
      { "t": "比之无首，凶。", "x": "比之无首，无所終也。" }
    ]
  },
  "6,7": {
    "name": "小畜",
    "t": "亨。密雲不雨，自我西郊。",
    "xiang": "風行天上，小畜；君子以懿文德。",
    "l": [
      { "t": "復自道，何其咎，吉。", "x": "復自道，其義吉也。" },
      { "t": "牽復，吉。", "x": "牽復在中，亦不自失也。" },
      { "t": "輿說輻，夫妻反目。", "x": "夫妻反目，不能正室也。" },
      { "t": "有孚，血去惕出，无咎。", "x": "有孚惕出，上合志也。" },
      { "t": "有孚攣如，富以其鄰。", "x": "有孚攣如，不獨富也。" },
      { "t": "既雨既處，尚德載，婦貞厲。月幾望，君子征凶。", "x": "既雨既處，德積載也。君子征凶，有所疑也。" }
    ]
  },
  "7,3": {
    "name": "履",
    "t": "履虎尾，不咥人，亨。",
    "xiang": "上天下澤，履；君子以辨上下，定民志。",
    "l": [
      { "t": "素履，往无咎。", "x": "素履之往，獨行願也。" },
      { "t": "履道坦坦，幽人貞吉。", "x": "幽人貞吉，中不自亂也。" },
      { "t": "眇能視，跛能履，履虎尾，咥人，凶。武人為于大君。", "x": "眇能視，不足以有明也。跛能履，不足以與行也。咥人之凶，位不當也。武人為于大君，志剛也。" },
      { "t": "履虎尾，愬愬，終吉。", "x": "愬愬終吉，志行也。" },
      { "t": "夬履，貞厲。", "x": "夬履貞厲，位正當也。" },
      { "t": "視履考祥，其旋元吉。", "x": "元吉在上，大有慶也。" }
    ]
  },
  "0,7": {
    "name": "泰",
    "t": "小往大來，吉亨。",
    "xiang": "天地交，泰；后以財成天地之道，輔相天地之宜，以左右民。",
    "l": [
      { "t": "拔茅茹，以其彙，征吉。", "x": "拔茅征吉，志在外也。" },
      { "t": "包荒，用馮河，不遐遺，朋亡，得尚于中行。", "x": "包荒，得尚于中行，以光大也。" },
      { "t": "无平不陂，无往不復，艱貞无咎。勿恤其孚，于食有福。", "x": "无往不復，天地際也。" },
      { "t": "翩翩，不富以其鄰，不戒以孚。", "x": "翩翩不富，皆失實也。不戒以孚，中心願也。" },
      { "t": "帝乙歸妹，以祉元吉。", "x": "以祉元吉，中以行願也。" },
      { "t": "城復于隍，勿用師。自邑告命，貞吝。", "x": "城復于隍，其命亂也。" }
    ]
  },
  "7,0": {
    "name": "否",
    "t": "否之匪人，不利君子貞，大往小來。",
    "xiang": "天地不交，否；君子以儉德辟難，不可榮以祿。",
    "l": [
      { "t": "拔茅茹，以其彙，貞吉亨。", "x": "拔茅貞吉，志在君也。" },
      { "t": "包承，小人吉，大人否亨。", "x": "大人否亨，不亂群也。" },
      { "t": "包羞。", "x": "包羞，位不當也。" },
      { "t": "有命无咎，疇離祉。", "x": "有命无咎，志行也。" },
      { "t": "休否，大人吉。其亡其亡，繫于苞桑。", "x": "大人之吉，位正當也。" },
      { "t": "傾否，先否後喜。", "x": "否終則傾，何可長也。" }
    ]
  },
  "7,5": {
    "name": "同人",
    "t": "同人于野，亨。利涉大川，利君子貞。",
    "xiang": "天與火，同人；君子以類族辨物。",
    "l": [
      { "t": "同人于門，无咎。", "x": "出門同人，又誰咎也。" },
      { "t": "同人于宗，吝。", "x": "同人于宗，吝道也。" },
      { "t": "伏戎于莽，升其高陵，三歲不興。", "x": "伏戎于莽，敵剛也。三歲不興，安行也。" },
      { "t": "乘其墉，弗克攻，吉。", "x": "乘其墉，義弗克也，其吉，則困而反則也。" },
      { "t": "同人，先號啕而後笑。大師克相遇。", "x": "同人之先，以中直也。大師相遇，言相克也。" },
      { "t": "同人于郊，无悔。", "x": "同人于郊，志未得也。" }
    ]
  },
  "5,7": {
    "name": "大有",
    "t": "元亨。",
    "xiang": "火在天上，大有；君子以遏惡揚善，順天休命。",
    "l": [
      { "t": "无交害，匪咎，艱則无咎。", "x": "大有初九，无交害也。" },
      { "t": "大車以載，有攸往，无咎。", "x": "大車以載，積中不敗也。" },
      { "t": "公用亨于天子，小人弗克。", "x": "公用亨于天子，小人害也。" },
      { "t": "匪其彭，无咎。", "x": "匪其彭，无咎；明辨晳也。" },
      { "t": "厥孚交如，威如；吉。", "x": "厥孚交如，信以發志也。威如之吉，易而无備也。" },
      { "t": "自天祐之，吉无不利。", "x": "大有上吉，自天祐也。" }
    ]
  },
  "0,4": {
    "name": "謙",
    "t": "亨，君子有終。",
    "xiang": "地中有山，謙；君子以裒多益寡，稱物平施。",
    "l": [
      { "t": "謙謙君子，用涉大川，吉。", "x": "謙謙君子，卑以自牧也。" },
      { "t": "鳴謙，貞吉。", "x": "鳴謙貞吉，中心得也。" },
      { "t": "勞謙，君子有終，吉。", "x": "勞謙君子，萬民服也。" },
      { "t": "无不利，撝謙。", "x": "无不利，撝謙；不違則也。" },
      { "t": "不富以其鄰，利用侵伐，无不利。", "x": "利用侵伐，征不服也。" },
      { "t": "鳴謙，利用行師，征邑國。", "x": "鳴謙，志未得也。可用行師，征邑國也。" }
    ]
  },
  "1,0": {
    "name": "豫",
    "t": "利建侯行師。",
    "xiang": "雷出地奮，豫；先王以作樂崇德，殷薦之上帝，以配祖考。",
    "l": [
      { "t": "鳴豫，凶。", "x": "初六鳴豫，志窮凶也。" },
      { "t": "介于石，不終日，貞吉。", "x": "不終日，貞吉；以中正也。" },
      { "t": "盱豫，悔。遲有悔。", "x": "盱豫有悔，位不當也。" },
      { "t": "由豫，大有得。勿疑，朋盍簪。", "x": "由豫，大有得；志大行也。" },
      { "t": "貞疾，恆不死。", "x": "六五貞疾，乘剛也。恆不死，中未亡也。" },
      { "t": "冥豫，成有渝，无咎。", "x": "冥豫在上，何可長也。" }
    ]
  },
  "3,1": {
    "name": "隨",
    "t": "元亨利貞，无咎。",
    "xiang": "澤中有雷，隨；君子以嚮晦入宴息。",
    "l": [
      { "t": "官有渝，貞吉。出門交有功。", "x": "官有渝，從正吉也。出門交有功，不失也。" },
      { "t": "係小子，失丈夫。", "x": "係小子，弗兼與也。" },
      { "t": "係丈夫，失小子。隨有求得，利居貞。", "x": "係丈夫，志舍下也。" },
      { "t": "隨有獲，貞凶。有孚在道，以明，何咎。", "x": "隨有獲，其義凶也。有孚在道，明功也。" },
      { "t": "孚于嘉，吉。", "x": "孚于嘉，吉；位正中也。" },
      { "t": "拘係之，乃從維之。王用亨于西山。", "x": "拘係之，上窮也。" }
    ]
  },
  "4,6": {
    "name": "蠱",
    "t": "元亨，利涉大川。先甲三日，後甲三日。",
    "xiang": "山下有風，蠱；君子以振民育德。",
    "l": [
      { "t": "幹父之蠱，有子，考无咎，厲終吉。", "x": "幹父之蠱，意承考也。" },
      { "t": "幹母之蠱，不可貞。", "x": "幹母之蠱，得中道也。" },
      { "t": "幹父之蠱，小有悔，无大咎。", "x": "幹父之蠱，終无咎也。" },
      { "t": "裕父之蠱，往見吝。", "x": "裕父之蠱，往未得也。" },
      { "t": "幹父之蠱，用譽。", "x": "幹父用譽，承以德也。" },
      { "t": "不事王侯，高尚其事。", "x": "不事王侯，志可則也。" }
    ]
  },
  "0,3": {
    "name": "臨",
    "t": "元亨利貞。至於八月有凶。",
    "xiang": "澤上有地，臨；君子以教思无窮，容保民无疆。",
    "l": [
      { "t": "咸臨，貞吉。", "x": "咸臨貞吉，志行正也。" },
      { "t": "咸臨，吉无不利。", "x": "咸臨，吉无不利；未順命也。" },
      { "t": "甘臨，无攸利。既憂之，无咎。", "x": "甘臨，位不當也。既憂之，咎不長也。" },
      { "t": "至臨，无咎。", "x": "至臨无咎，位當也。" },
      { "t": "知臨，大君之宜，吉。", "x": "大君之宜，行中之謂也。" },
      { "t": "敦臨，吉无咎。", "x": "敦臨之吉，志在內也。" }
    ]
  },
  "6,0": {
    "name": "觀",
    "t": "盥而不薦，有孚顒若。",
    "xiang": "風行地上，觀；先王以省方，觀民設教。",
    "l": [
      { "t": "童觀，小人无咎，君子吝。", "x": "初六童觀，小人道也。" },
      { "t": "闚觀，利女貞。", "x": "闚觀女貞，亦可醜也。" },
      { "t": "觀我生，進退。", "x": "觀我生，進退；未失道也。" },
      { "t": "觀國之光，利用賓于王。", "x": "觀國之光，尚賓也。" },
      { "t": "觀我生，君子无咎。", "x": "觀我生，觀民也。" },
      { "t": "觀其生，君子无咎。", "x": "觀其生，志未平也。" }
    ]
  },
  "5,1": {
    "name": "噬嗑",
    "t": "亨。利用獄。",
    "xiang": "雷電，噬嗑；先王以明罰勅法。",
    "l": [
      { "t": "屨校滅趾，无咎。", "x": "屨校滅趾，不行也。" },
      { "t": "噬膚滅鼻，无咎。", "x": "噬膚滅鼻，乘剛也。" },
      { "t": "噬臘肉，遇毒，小吝，无咎。", "x": "遇毒，位不當也。" },
      { "t": "噬乾胏，得金矢，利艱貞，吉。", "x": "利艱貞吉，未光也。" },
      { "t": "噬乾肉，得黃金，貞厲，无咎。", "x": "貞厲无咎，得當也。" },
      { "t": "何校滅耳，凶。", "x": "何校滅耳，聰不明也。" }
    ]
  },
  "4,5": {
    "name": "賁",
    "t": "亨。小利有攸往。",
    "xiang": "山下有火，賁；君子以明庶政，无敢折獄。",
    "l": [
      { "t": "賁其趾，舍車而徒。", "x": "舍車而徒，義弗乘也。" },
      { "t": "賁其須。", "x": "賁其須，與上興也。" },
      { "t": "賁如濡如，永貞吉。", "x": "永貞之吉，終莫之陵也。" },
      { "t": "賁如皤如，白馬翰如，匪寇婚媾。", "x": "六四，當位疑也。匪寇婚媾，終无尤也。" },
      { "t": "賁于丘園，束帛戔戔，吝，終吉。", "x": "六五之吉，有喜也。" },
      { "t": "白賁，无咎。", "x": "白賁无咎，上得志也。" }
    ]
  },
  "4,0": {
    "name": "剝",
    "t": "不利有攸往。",
    "xiang": "山附于地，剝；上以厚下安宅。",
    "l": [
      { "t": "剝床以足，蔑貞凶。", "x": "剝床以足，以滅下也。" },
      { "t": "剝床以辨，蔑貞凶。", "x": "剝床以辨，未有與也。" },
      { "t": "剝之，无咎。", "x": "剝之无咎，失上下也。" },
      { "t": "剝床以膚，凶。", "x": "剝床以膚，切近災也。" },
      { "t": "貫魚，以宮人寵，无不利。", "x": "以宮人寵，終无尤也。" },
      { "t": "碩果不食，君子得輿，小人剝廬。", "x": "君子得輿，民所載也。小人剝廬，終不可用也。" }
    ]
  },
  "0,1": {
    "name": "復",
    "t": "亨。出入无疾，朋來无咎。反復其道，七日來復，利有攸往。",
    "xiang": "雷在地中，復；先王以至日閉關，商旅不行，后不省方。",
    "l": [
      { "t": "不遠復，无祇悔，元吉。", "x": "不遠之復，以修身也。" },
      { "t": "休復，吉。", "x": "休復之吉，以下仁也。" },
      { "t": "頻復，厲无咎。", "x": "頻復之厲，義无咎也。" },
      { "t": "中行獨復。", "x": "中行獨復，以從道也。" },
      { "t": "敦復，无悔。", "x": "敦復无悔，中以自考也。" },
      { "t": "迷復，凶，有災眚。用行師，終有大敗，以其國君，凶；至於十年，不克征。", "x": "迷復之凶，反君道也。" }
    ]
  },
  "7,1": {
    "name": "无妄",
    "t": "元亨利貞。其匪正有眚，不利有攸往。",
    "xiang": "天下雷行，物與无妄；先王以茂對時，育萬物。",
    "l": [
      { "t": "无妄，往吉。", "x": "无妄之往，得志也。" },
      { "t": "不耕穫，不菑畬，則利有攸往。", "x": "不耕穫，未富也。" },
      { "t": "无妄之災，或繫之牛，行人之得，邑人之災。", "x": "行人得牛，邑人災也。" },
      { "t": "可貞，无咎。", "x": "可貞无咎，固有之也。" },
      { "t": "无妄之疾，勿藥有喜。", "x": "无妄之藥，不可試也。" },
      { "t": "无妄，行有眚，无攸利。", "x": "无妄之行，窮之災也。" }
    ]
  },
  "4,7": {
    "name": "大畜",
    "t": "利貞，不家食吉，利涉大川。",
    "xiang": "天在山中，大畜；君子以多識前言往行，以畜其德。",
    "l": [
      { "t": "有厲，利已。", "x": "有厲利已，不犯災也。" },
      { "t": "輿說輻。", "x": "輿說輻，中无尤也。" },
      { "t": "良馬逐，利艱貞。日閑輿衛，利有攸往。", "x": "利有攸往，上合志也。" },
      { "t": "童牛之牿，元吉。", "x": "六四元吉，有喜也。" },
      { "t": "豶豕之牙，吉。", "x": "六五之吉，有慶也。" },
      { "t": "何天之衢，亨。", "x": "何天之衢，道大行也。" }
    ]
  },
  "4,1": {
    "name": "頤",
    "t": "貞吉。觀頤，自求口實。",
    "xiang": "山下有雷，頤；君子以慎言語，節飲食。",
    "l": [
      { "t": "舍爾靈龜，觀我朵頤，凶。", "x": "觀我朵頤，亦不足貴也。" },
      { "t": "顛頤，拂經，于丘頤，征凶。", "x": "六二征凶，行失類也。" },
      { "t": "拂頤，貞凶，十年勿用，无攸利。", "x": "十年勿用，道大悖也。" },
      { "t": "顛頤，吉，虎視眈眈，其欲逐逐，无咎。", "x": "顛頤之吉，上施光也。" },
      { "t": "拂經，居貞吉，不可涉大川。", "x": "居貞之吉，順以從上也。" },
      { "t": "由頤，厲吉，利涉大川。", "x": "由頤厲吉，大有慶也。" }
    ]
  },
  "3,6": {
    "name": "大過",
    "t": "棟橈，利有攸往，亨。",
    "xiang": "澤滅木，大過；君子以獨立不懼，遁世无悶。",
    "l": [
      { "t": "藉用白茅，无咎。", "x": "藉用白茅，柔在下也。" },
      { "t": "枯楊生稊，老夫得其女妻，无不利。", "x": "老夫女妻，過以相與也。" },
      { "t": "棟橈，凶。", "x": "棟橈之凶，不可以有輔也。" },
      { "t": "棟隆，吉，有它吝。", "x": "棟隆之吉，不橈乎下也。" },
      { "t": "枯楊生華，老婦得其士夫，无咎无譽。", "x": "枯楊生華，何可久也。老婦士夫，亦可醜也。" },
      { "t": "過涉滅頂，凶，无咎。", "x": "過涉之凶，不可咎也。" }
    ]
  },
  "2,2": {
    "name": "坎",
    "t": "習坎，有孚，維心亨，行有尚。",
    "xiang": "水洊至，習坎；君子以常德行，習教事。",
    "l": [
      { "t": "習坎，入于坎窞，凶。", "x": "習坎入坎，失道凶也。" },
      { "t": "坎有險，求小得。", "x": "求小得，未出中也。" },
      { "t": "來之坎坎，險且枕，入于坎窞，勿用。", "x": "來之坎坎，終无功也。" },
      { "t": "樽酒簋貳，用缶，納約自牖，終无咎。", "x": "樽酒簋貳，剛柔際也。" },
      { "t": "坎不盈，祇既平，无咎。", "x": "坎不盈，中未大也。" },
      { "t": "係用徽纆，寘于叢棘，三歲不得，凶。", "x": "上六失道，凶三歲也。" }
    ]
  },
  "5,5": {
    "name": "離",
    "t": "利貞，亨。畜牝牛，吉。",
    "xiang": "明兩作，離；大人以繼明照于四方。",
    "l": [
      { "t": "履錯然，敬之，无咎。", "x": "履錯之敬，以辟咎也。" },
      { "t": "黃離，元吉。", "x": "黃離元吉，得中道也。" },
      { "t": "日昃之離，不鼓缶而歌，則大耋之嗟，凶。", "x": "日昃之離，何可久也。" },
      { "t": "突如其來如，焚如，死如，棄如。", "x": "突如其來如，无所容也。" },
      { "t": "出涕沱若，戚戚若，吉。", "x": "六五之吉，離王公也。" },
      { "t": "王用出征，有嘉折首，獲匪其醜，无咎。", "x": "王用出征，以正邦也。" }
    ]
  },
  
  "3,4": {
    "name": "咸",
    "t": "亨，利貞，取女吉。",
    "xiang": "山上有澤，咸；君子以虛受人。",
    "l": [
      { "t": "咸其拇。", "x": "咸其拇，志在外也。" },
      { "t": "咸其腓，凶，居吉。", "x": "雖凶居吉，順不害也。" },
      { "t": "咸其股，執其隨，往吝。", "x": "咸其股，亦不處也。志在隨人，所執下也。" },
      { "t": "貞吉，悔亡，憧憧往來，朋從爾思。", "x": "貞吉悔亡，未感害也。憧憧往來，未光大也。" },
      { "t": "咸其脢，无悔。", "x": "咸其脢，志末也。" },
      { "t": "咸其輔，頰，舌。", "x": "咸其輔，頰，舌，滕口說也。" }
    ]
  },
  "1,6": {
    "name": "恆",
    "t": "亨，无咎，利貞，利有攸往。",
    "xiang": "雷風，恆；君子以立不易方。",
    "l": [
      { "t": "浚恆，貞凶，无攸利。", "x": "浚恆之凶，始求深也。" },
      { "t": "悔亡。", "x": "九二悔亡，能久中也。" },
      { "t": "不恆其德，或承之羞，貞吝。", "x": "不恆其德，无所容也。" },
      { "t": "田无禽。", "x": "久非其位，安得禽也。" },
      { "t": "恆其德，貞，婦人吉，夫子凶。", "x": "婦人貞吉，從一而終也。夫子制義，從婦凶也。" },
      { "t": "振恆，凶。", "x": "振恆在上，大无功也。" }
    ]
  },
  "7,4": {
    "name": "遯",
    "t": "亨，小利貞。",
    "xiang": "天下有山，遯；君子以遠小人，不惡而嚴。",
    "l": [
      { "t": "遯尾，厲，勿用有攸往。", "x": "遯尾之厲，不往何災也。" },
      { "t": "執之用黃牛之革，莫之勝說。", "x": "執之用黃牛，固志也。" },
      { "t": "係遯，有疾厲，畜臣妾吉。", "x": "係遯之厲，有疾憊也。畜臣妾吉，不可大事也。" },
      { "t": "好遯，君子吉，小人否。", "x": "君子好遯，小人否也。" },
      { "t": "嘉遯，貞吉。", "x": "嘉遯貞吉，以正志也。" },
      { "t": "肥遯，无不利。", "x": "肥遯无不利，无所疑也。" }
    ]
  },
  "1,7": {
    "name": "大壯",
    "t": "利貞。",
    "xiang": "雷在天上，大壯；君子以非禮弗履。",
    "l": [
      { "t": "壯于趾，征凶，有孚。", "x": "壯于趾，其孚窮也。" },
      { "t": "貞吉。", "x": "九二貞吉，以中也。" },
      { "t": "小人用壯，君子用罔，貞厲。羝羊觸藩，羸其角。", "x": "小人用壯，君子罔也。" },
      { "t": "貞吉，悔亡，藩決不羸，壯于大輿之輹。", "x": "藩決不羸，尚往也。" },
      { "t": "喪羊于易，无悔。", "x": "喪羊于易，位不當也。" },
      { "t": "羝羊觸藩，不能退，不能遂，无攸利，艱則吉。", "x": "不能退，不能遂，不詳也。艱則吉，咎不長也。" }
    ]
  },
  "5,0": {
    "name": "晉",
    "t": "康侯用錫馬蕃庶，晝日三接。",
    "xiang": "明出地上，晉；君子以自昭明德。",
    "l": [
      { "t": "晉如，摧如，貞吉。罔孚，裕无咎。", "x": "晉如摧如，獨行正也。裕无咎，未受命也。" },
      { "t": "晉如，愁如，貞吉。受茲介福，于其王母。", "x": "受茲介福，以中正也。" },
      { "t": "眾允，悔亡。", "x": "眾允之志，上行也。" },
      { "t": "晉如鼫鼠，貞厲。", "x": "鼫鼠貞厲，位不當也。" },
      { "t": "悔亡，失得勿恤，往吉无不利。", "x": "失得勿恤，往有慶也。" },
      { "t": "晉其角，維用伐邑，厲吉无咎，貞吝。", "x": "維用伐邑，道未光也。" }
    ]
  },
  "0,5": {
    "name": "明夷",
    "t": "利艱貞。",
    "xiang": "明入地中，明夷；君子以蒞眾，用晦而明。",
    "l": [
      { "t": "明夷于飛，垂其翼。君子于行，三日不食，有攸往，主人有言。", "x": "君子于行，義不食也。" },
      { "t": "明夷，夷于左股，用拯馬壯，吉。", "x": "六二之吉，順以則也。" },
      { "t": "明夷于南狩，得其大首，不可疾貞。", "x": "南狩之志，乃大得也。" },
      { "t": "入于左腹，獲明夷之心，于出門庭。", "x": "入于左腹，獲心意也。" },
      { "t": "箕子之明夷，利貞。", "x": "箕子之貞，明不可息也。" },
      { "t": "不明晦，初登于天，後入于地。", "x": "初登于天，照四國也。後入于地，失則也。" }
    ]
  },
  "6,5": {
    "name": "家人",
    "t": "利女貞。",
    "xiang": "風自火出，家人；君子以言有物，而行有恆。",
    "l": [
      { "t": "閑有家，悔亡。", "x": "閑有家，志未變也。" },
      { "t": "无攸遂，在中饋，貞吉。", "x": "六二之吉，順以巽也。" },
      { "t": "家人嗃嗃，悔厲吉；婦子嘻嘻，終吝。", "x": "家人嗃嗃，未失也。婦子嘻嘻，失家節也。" },
      { "t": "富家，大吉。", "x": "富家大吉，順在位也。" },
      { "t": "王假有家，勿恤吉。", "x": "王假有家，交相愛也。" },
      { "t": "有孚威如，終吉。", "x": "威如之吉，反身之謂也。" }
    ]
  },
  "5,3": {
    "name": "睽",
    "t": "小事吉。",
    "xiang": "上火下澤，睽；君子以同而異。",
    "l": [
      { "t": "悔亡，喪馬勿逐，自復；見惡人，无咎。", "x": "見惡人，以辟咎也。" },
      { "t": "遇主于巷，无咎。", "x": "遇主于巷，未失道也。" },
      { "t": "見輿曳，其牛擎，其人天且劓，无初有終。", "x": "見輿曳，位不當也。无初有終，遇剛也。" },
      { "t": "睽孤，遇元夫，交孚，厲无咎。", "x": "交孚无咎，志行也。" },
      { "t": "悔亡，厥宗噬膚，往何咎。", "x": "厥宗噬膚，往有慶也。" },
      { "t": "睽孤，見豕負塗，載鬼一車，先張之弧，後說之弧，匪寇婚媾，往遇雨則吉。", "x": "遇雨之吉，群疑亡也。" }
    ]
  },
  "2,4": {
    "name": "蹇",
    "t": "利西南，不利東北。利見大人，貞吉。",
    "xiang": "山上有水，蹇；君子以反身修德。",
    "l": [
      { "t": "往蹇，來譽。", "x": "往蹇來譽，宜待也。" },
      { "t": "王臣蹇蹇，匪躬之故。", "x": "王臣蹇蹇，終无尤也。" },
      { "t": "往蹇，來反。", "x": "往蹇來反，內喜之也。" },
      { "t": "往蹇，來連。", "x": "往蹇來連，當位實也。" },
      { "t": "大蹇，朋來。", "x": "大蹇朋來，以中節也。" },
      { "t": "往蹇，來碩，吉，利見大人。", "x": "往蹇來碩，志在內也。利見大人，以從貴也。" }
    ]
  },
  "1,2": {
    "name": "解",
    "t": "利西南，无所往，其來復吉。有攸往，夙吉。",
    "xiang": "雷雨作，解；君子以赦過宥罪。",
    "l": [
      { "t": "无咎。", "x": "剛柔之際，義无咎也。" },
      { "t": "田獲三狐，得黃矢，貞吉。", "x": "九二貞吉，得中道也。" },
      { "t": "負且乘，致寇至，貞吝。", "x": "負且乘，亦可醜也。自我致戎，又誰咎也。" },
      { "t": "解而拇，朋至斯孚。", "x": "解而拇，未當位也。" },
      { "t": "君子維有解，吉，有孚于小人。", "x": "君子有解，小人退也。" },
      { "t": "公用射隼于高墉之上，獲之，无不利。", "x": "公用射隼，以解悖也。" }
    ]
  },
  "4,3": {
    "name": "損",
    "t": "有孚，元吉，无咎，可貞，利有攸往。曷之用，二簋可用享。",
    "xiang": "山下有澤，損；君子以懲忿窒欲。",
    "l": [
      { "t": "已事遄往，无咎，酌損之。", "x": "已事遄往，尚合志也。" },
      { "t": "利貞，征凶，弗損益之。", "x": "九二利貞，中以為志也。" },
      { "t": "三人行，則損一人；一人行，則得其友。", "x": "一人行，三則疑也。" },
      { "t": "損其疾，使遄有喜，无咎。", "x": "損其疾，亦可喜也。" },
      { "t": "或益之，十朋之龜弗克違，元吉。", "x": "六五元吉，自上祐也。" },
      { "t": "弗損益之，无咎，貞吉，利有攸往，得臣无家。", "x": "弗損益之，大得志也。" }
    ]
  },
  "6,1": {
    "name": "益",
    "t": "利有攸往，利涉大川。",
    "xiang": "風雷，益；君子以見善則遷，有過則改。",
    "l": [
      { "t": "利用為大作，元吉，无咎。", "x": "元吉无咎，下不厚事也。" },
      { "t": "或益之，十朋之龜弗克違，永貞吉。王用享于帝，吉。", "x": "或益之，自外來也。" },
      { "t": "益之用凶事，无咎。有孚中行，告公用圭。", "x": "益用凶事，固有之也。" },
      { "t": "中行，告公從。利用為依遷國。", "x": "告公從，以益志也。" },
      { "t": "有孚惠心，勿問元吉。有孚惠我德。", "x": "有孚惠心，勿問之矣。惠我德，大得志也。" },
      { "t": "莫益之，或擊之，立心勿恆，凶。", "x": "莫益之，偏辭也。或擊之，自外來也。" }
    ]
  },
  "3,7": {
    "name": "夬",
    "t": "揚于王庭，孚號，有厲，告自邑，不利即戎，利有攸往。",
    "xiang": "澤上于天，夬；君子以施祿及下，居德則忌。",
    "l": [
      { "t": "壯于前趾，往不勝為咎。", "x": "不勝而往，咎也。" },
      { "t": "惕號，莫夜有戎，勿恤。", "x": "有戎勿恤，得中道也。" },
      { "t": "壯于頄，有凶。君子夬夬，獨行遇雨，若濡有慍，无咎。", "x": "君子夬夬，終无咎也。" },
      { "t": "臀无膚，其行次且。牽羊悔亡，聞言不信。", "x": "其行次且，位不當也。聞言不信，聰不明也。" },
      { "t": "莧陸夬夬，中行无咎。", "x": "中行无咎，中未光也。" },
      { "t": "无號，終有凶。", "x": "无號之凶，終不可長也。" }
    ]
  },
  "7,6": {
    "name": "姤",
    "t": "女壯，勿用取女。",
    "xiang": "天下有風，姤；后以施命誥四方。",
    "l": [
      { "t": "繫于金柅，貞吉，有攸往，見凶，羸豕孚蹢躅。", "x": "繫于金柅，柔道牽也。" },
      { "t": "包有魚，无咎，不利賓。", "x": "包有魚，義不及賓也。" },
      { "t": "臀无膚，其行次且，厲，无大咎。", "x": "其行次且，行未牽也。" },
      { "t": "包无魚，起凶。", "x": "无魚之凶，遠民也。" },
      { "t": "以杞包瓜，含章，有隕自天。", "x": "九五含章，中正也。有隕自天，志不舍命也。" },
      { "t": "姤其角，吝，无咎。", "x": "姤其角，上窮吝也。" }
    ]
  },
  "3,0": {
    "name": "萃",
    "t": "亨。王假有廟，利見大人，亨，利貞。用大牲吉，利有攸往。",
    "xiang": "澤上于地，萃；君子以除戎器，戒不虞。",
    "l": [
      { "t": "有孚不終，乃亂乃萃，若號，一握為笑，勿恤，往无咎。", "x": "乃亂乃萃，其志亂也。" },
      { "t": "引吉，无咎，孚乃利用禴。", "x": "引吉无咎，中未變也。" },
      { "t": "萃如，嗟如，无攸利，往无咎，小吝。", "x": "往无咎，上巽也。" },
      { "t": "大吉，无咎。", "x": "大吉无咎，位不當也。" },
      { "t": "萃有位，无咎。匪孚，元永貞，悔亡。", "x": "萃有位，志未光也。" },
      { "t": "齎咨涕洟，无咎。", "x": "齎咨涕洟，未安上也。" }
    ]
  },
  "0,6": {
    "name": "升",
    "t": "元亨，用見大人，勿恤，南征吉。",
    "xiang": "地中生木，升；君子以順德，積小以高大。",
    "l": [
      { "t": "允升，大吉。", "x": "允升大吉，上合志也。" },
      { "t": "孚乃利用禴，无咎。", "x": "九二之孚，有喜也。" },
      { "t": "升虛邑。", "x": "升虛邑，无所疑也。" },
      { "t": "王用亨于岐山，吉无咎。", "x": "王用亨于岐山，順事也。" },
      { "t": "貞吉，升階。", "x": "貞吉升階，大得志也。" },
      { "t": "冥升，利于不息之貞。", "x": "冥升在上，消不富也。" }
    ]
  },
  "3,2": {
    "name": "困",
    "t": "亨，貞，大人吉，无咎，有言不信。",
    "xiang": "澤无水，困；君子以致命遂志。",
    "l": [
      { "t": "臀困于株木，入于幽谷，三歲不覿。", "x": "入于幽谷，幽不明也。" },
      { "t": "困于酒食，朱紱方來，利用享祀，征凶，无咎。", "x": "困于酒食，中有慶也。" },
      { "t": "困于石，據于蒺藜，入于其宮，不見其妻，凶。", "x": "據于蒺藜，乘剛也。入于其宮，不見其妻，不祥也。" },
      { "t": "來徐徐，困于金車，吝，有終。", "x": "來徐徐，志在下也。雖不當位，有與也。" },
      { "t": "劓刖，困于赤紱，乃徐有說，利用祭祀。", "x": "劓刖，志未得也。乃徐有說，以中直也。利用祭祀，受福也。" },
      { "t": "困于葛藟，于臲卼，曰動悔。有悔，征吉。", "x": "困于葛藟，未當也。動悔，有悔，吉行也。" }
    ]
  },
  "2,6": {
    "name": "井",
    "t": "改邑不改井，无喪无得，往來井井。汔至，亦未繘井，羸其瓶，凶。",
    "xiang": "木上有水，井；君子以勞民勸相。",
    "l": [
      { "t": "井泥不食，舊井无禽。", "x": "井泥不食，下也。舊井无禽，時舍也。" },
      { "t": "井谷射鮒，甕敝漏。", "x": "井谷射鮒，无與也。" },
      { "t": "井渫不食，為我心惻，可用汲，王明，並受其福。", "x": "井渫不食，行惻也。求王明，受福也。" },
      { "t": "井甃，无咎。", "x": "井甃无咎，修井也。" },
      { "t": "井冽，寒泉食。", "x": "寒泉之食，中正也。" },
      { "t": "井收勿幕，有孚元吉。", "x": "元吉在上，大成也。" }
    ]
  },
  "3,5": {
    "name": "革",
    "t": "已日乃孚，元亨利貞，悔亡。",
    "xiang": "澤中有火，革；君子以治歷明時。",
    "l": [
      { "t": "鞏用黃牛之革。", "x": "鞏用黃牛，不可以有為也。" },
      { "t": "已日乃革之，征吉，无咎。", "x": "已日革之，行有嘉也。" },
      { "t": "征凶，貞厲，革言三就，有孚。", "x": "革言三就，又何之矣。" },
      { "t": "悔亡，有孚改命，吉。", "x": "改命之吉，信志也。" },
      { "t": "大人虎變，未占有孚。", "x": "大人虎變，其文炳也。" },
      { "t": "君子豹變，小人革面，征凶，居貞吉。", "x": "君子豹變，其文蔚也。小人革面，順以從君也。" }
    ]
  },
  "5,6": {
    "name": "鼎",
    "t": "元吉，亨。",
    "xiang": "木上有火，鼎；君子以正位凝命。",
    "l": [
      { "t": "鼎顛趾，利出否，得妾以其子，无咎。", "x": "鼎顛趾，未悖也。利出否，以從貴也。" },
      { "t": "鼎有實，我仇有疾，不我能即，吉。", "x": "鼎有實，慎所之也。我仇有疾，終无尤也。" },
      { "t": "鼎耳革，其行塞，雉膏不食，方雨虧悔，終吉。", "x": "鼎耳革，失其義也。" },
      { "t": "鼎折足，覆公餗，其形渥，凶。", "x": "覆公餗，信如何也。" },
      { "t": "鼎黃耳金鉉，利貞。", "x": "鼎黃耳，中以為實也。" },
      { "t": "鼎玉鉉，大吉，无不利。", "x": "玉鉉在上，剛柔節也。" }
    ]
  },
  
  "1,1": {
    "name": "震",
    "t": "亨。震來虩虩，笑言啞啞。震驚百里，不喪匕鬯。",
    "xiang": "洊雷，震；君子以恐懼修省。",
    "l": [
      { "t": "震來虩虩，後笑言啞啞，吉。", "x": "震來虩虩，恐致福也。笑言啞啞，後有則也。" },
      { "t": "震來厲，億喪貝，躋于九陵，勿逐，七日得。", "x": "震來厲，乘剛也。" },
      { "t": "震蘇蘇，震行无眚。", "x": "震蘇蘇，位不當也。" },
      { "t": "震遂泥。", "x": "震遂泥，未光也。" },
      { "t": "震往來厲，億无喪，有事。", "x": "震往來厲，危行也。其事在中，大无喪也。" },
      { "t": "震索索，視矍矍，征凶。震不于其躬，于其鄰，无咎。婚媾有言。", "x": "震索索，中未得也。雖凶无咎，畏鄰戒也。" }
    ]
  },
  "4,4": {
    "name": "艮",
    "t": "艮其背，不獲其身，行其庭，不見其人，无咎。",
    "xiang": "兼山，艮；君子以思不出其位。",
    "l": [
      { "t": "艮其趾，无咎，利永貞。", "x": "艮其趾，未失正也。" },
      { "t": "艮其腓，不拯其隨，其心不快。", "x": "不拯其隨，未退聽也。" },
      { "t": "艮其限，列其夤，厲薰心。", "x": "艮其限，危薰心也。" },
      { "t": "艮其身，无咎。", "x": "艮其身，止諸躬也。" },
      { "t": "艮其輔，言有序，悔亡。", "x": "艮其輔，以中正也。" },
      { "t": "敦艮，吉。", "x": "敦艮之吉，以厚終也。" }
    ]
  },
  "6,4": {
    "name": "漸",
    "t": "女歸吉，利貞。",
    "xiang": "山上有木，漸；君子以居賢德善俗。",
    "l": [
      { "t": "鴻漸于干，小子厲，有言，无咎。", "x": "小子之厲，義无咎也。" },
      { "t": "鴻漸于磐，飲食衎衎，吉。", "x": "飲食衎衎，不素飽也。" },
      { "t": "鴻漸于陸，夫征不復，婦孕不育，凶，利禦寇。", "x": "夫征不復，離群醜也。婦孕不育，失其道也。利用禦寇，順相保也。" },
      { "t": "鴻漸于木，或得其桷，无咎。", "x": "或得其桷，順以巽也。" },
      { "t": "鴻漸于陵，婦三歲不孕，終莫之勝，吉。", "x": "終莫之勝吉，得所願也。" },
      { "t": "鴻漸于陸，其羽可用為儀，吉。", "x": "其羽可用為儀，吉；不可亂也。" }
    ]
  },
  "1,3": {
    "name": "歸妹",
    "t": "征凶，无攸利。",
    "xiang": "澤上有雷，歸妹；君子以永終知敝。",
    "l": [
      { "t": "歸妹以娣，跛能履，征吉。", "x": "歸妹以娣，以恆也。跛能履吉，相承也。" },
      { "t": "眇能視，利幽人之貞。", "x": "利幽人之貞，未變常也。" },
      { "t": "歸妹以須，反歸以娣。", "x": "歸妹以須，未當也。" },
      { "t": "歸妹愆期，遲歸有時。", "x": "愆期之志，有待而行也。" },
      { "t": "帝乙歸妹，其君之袂，不如其娣之袂良，月幾望，吉。", "x": "帝乙歸妹，不如其娣之袂良也。其位在中，以貴行也。" },
      { "t": "女承筐无實，士刲羊无血，无攸利。", "x": "上六无實，承虛筐也。" }
    ]
  },
  "1,5": {
    "name": "豐",
    "t": "亨，王假之，勿憂，宜日中。",
    "xiang": "雷電皆至，豐；君子以折獄致刑。",
    "l": [
      { "t": "遇其配主，雖旬无咎，往有尚。", "x": "雖旬无咎，過旬災也。" },
      { "t": "豐其蔀，日中見斗，往得疑疾，有孚發若，吉。", "x": "有孚發若，信以發志也。" },
      { "t": "豐其沛，日中見沬，折其右肱，无咎。", "x": "豐其沛，不可大事也。折其右肱，終不可用也。" },
      { "t": "豐其蔀，日中見斗，遇其夷主，吉。", "x": "豐其蔀，位不當也。日中見斗，幽不明也。遇其夷主，吉行也。" },
      { "t": "來章，有慶譽，吉。", "x": "六五之吉，有慶也。" },
      { "t": "豐其屋，蔀其家，窺其戶，闃其无 人，三歲不覿，凶。", "x": "豐其屋，天際翔也。窺其戶，闃其无人，自藏也。" }
    ]
  },
  "5,4": {
    "name": "旅",
    "t": "小亨，旅貞吉。",
    "xiang": "山上有火，旅；君子以明慎用刑，而不留獄。",
    "l": [
      { "t": "旅瑣瑣，斯其所取災。", "x": "旅瑣瑣，志窮災也。" },
      { "t": "旅即次，懷其資，得童僕貞。", "x": "得童僕貞，終无尤也。" },
      { "t": "旅焚其次，喪其童僕，貞厲。", "x": "旅焚其次，亦以傷矣。以旅與下，其義喪也。" },
      { "t": "旅于處，得其資斧，我心不快。", "x": "旅于處，未得位也。得其資斧，心未快也。" },
      { "t": "射雉一矢亡，終以譽命。", "x": "終以譽命，上逮也。" },
      { "t": "鳥焚其巢，旅人先笑後號啕。喪牛于易，凶。", "x": "以旅在上，其義焚也。喪牛于易，終莫之聞也。" }
    ]
  },
  "6,6": {
    "name": "巽",
    "t": "小亨，利有攸往，利見大人。",
    "xiang": "隨風，巽；君子以申命行事。",
    "l": [
      { "t": "進退，利武人之貞。", "x": "進退，志疑也。利武人之貞，志治也。" },
      { "t": "巽在床下，用史巫紛若，吉无咎。", "x": "紛若之吉，得中也。" },
      { "t": "頻巽，吝。", "x": "頻巽之吝，志窮也。" },
      { "t": "悔亡，田獲三品。", "x": "田獲三品，有功也。" },
      { "t": "貞吉，悔亡，无不利。无初有終，先庚三日，後庚三日，吉。", "x": "九五之吉，位正中也。" },
      { "t": "巽在床下，喪其資斧，貞凶。", "x": "巽在床下，上窮也。喪其資斧，正乎凶也。" }
    ]
  },
  "3,3": {
    "name": "兌",
    "t": "亨，利貞。",
    "xiang": "麗澤，兌；君子以朋友講習。",
    "l": [
      { "t": "和兌，吉。", "x": "和兌之吉，行未疑也。" },
      { "t": "孚兌，吉，悔亡。", "x": "孚兌之吉，信志也。" },
      { "t": "來兌，凶。", "x": "來兌之凶，位不當也。" },
      { "t": "商兌，未寧，介疾有喜。", "x": "九四之喜，有慶也。" },
      { "t": "孚于剝，有厲。", "x": "孚于剝，位正當也。" },
      { "t": "引兌。", "x": "上六引兌，未光也。" }
    ]
  },
  "6,2": {
    "name": "渙",
    "t": "亨。王假有廟，利涉大川，利貞。",
    "xiang": "風行水上，渙；先王以享于帝立廟。",
    "l": [
      { "t": "用拯馬壯，吉。", "x": "初六之吉，順也。" },
      { "t": "渙奔其机，悔亡。", "x": "渙奔其机，得願也。" },
      { "t": "渙其躬，无咎。", "x": "渙其躬，志在外也。" },
      { "t": "渙其群，元吉。渙有丘，匪夷所思。", "x": "渙其群，元吉；光大也。" },
      { "t": "渙汗其大號，渙王居，无咎。", "x": "王居无咎，正位也。" },
      { "t": "渙其血，去逖出，无咎。", "x": "渙其血，遠害也。" }
    ]
  },
  "2,3": {
    "name": "節",
    "t": "亨。苦節不可貞。",
    "xiang": "澤上有水，節；君子以制數度，議德行。",
    "l": [
      { "t": "不出戶庭，无咎。", "x": "不出戶庭，知通塞也。" },
      { "t": "不出門庭，凶。", "x": "不出門庭凶，失時極也。" },
      { "t": "不節若，則嗟若，无咎。", "x": "不節之嗟，又誰咎也。" },
      { "t": "安節，亨。", "x": "安節之亨，承上道也。" },
      { "t": "甘節，吉；往有尚。", "x": "甘節之吉，居位中也。" },
      { "t": "苦節，貞凶，悔亡。", "x": "苦節貞凶，其道窮也。" }
    ]
  },
  "6,3": {
    "name": "中孚",
    "t": "豚魚吉，利涉大川，利貞。",
    "xiang": "澤上有風，中孚；君子以議獄緩死。",
    "l": [
      { "t": "虞吉，有它不燕。", "x": "初九虞吉，志未變也。" },
      { "t": "鳴鶴在陰，其子和之，我有好爵，吾與爾靡之。", "x": "其子和之，中心願也。" },
      { "t": "得敵，或鼓或罷，或泣或歌。", "x": "或鼓或罷，位不當也。" },
      { "t": "月幾望，馬匹亡，无咎。", "x": "馬匹亡，絕類上也。" },
      { "t": "有孚攣如，无咎。", "x": "有孚攣如，位正當也。" },
      { "t": "翰音登于天，貞凶。", "x": "翰音登于天，何可長也。" }
    ]
  },
  "1,4": {
    "name": "小過",
    "t": "亨，利貞，可小事，不可大事。飛鳥遺之音，不宜上宜下，大吉。",
    "xiang": "山上有雷，小過；君子以行過乎恭，喪過乎哀，用過乎儉。",
    "l": [
      { "t": "飛鳥以凶。", "x": "飛鳥以凶，不可如何也。" },
