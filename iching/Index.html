  let moveLineNames=[];
  ls.forEach((v,i)=>{ if(v===6||v===9){ let name=(i===0)?(v===9?"初九":"初六"):(i===5)?(v===9?"上九":"上六"):(v===9?"九":"六")+["","二","三","四","五"][i]; moveLineNames.push(name); }});

  let render=renderTable(date,G,Z,ss,oG,cG,pal,ls,oL,cL,hasM,dZ,mZ);
  renderText(oG,ls);

  let pad=n=>n<10?'0'+n:n;
  let dateStr=`西元 ${date.getFullYear()}年 ${pad(date.getMonth()+1)}月 ${pad(date.getDate())}日 ${pad(date.getHours())}:${pad(date.getMinutes())}`;
  let baziStr=`${G[0]}${Z[0]}年 ${G[1]}${Z[1]}月 ${G[2]}${Z[2]}日 ${G[3]}${Z[3]}時`;

  // 世/應整理
  let shi=render.oD.find(x=>x.sh), ying=render.oD.find(x=>x.yi);
  let shiYing = (shi?`世爻：${shi.i}爻 ${shi.lq} ${shi.g}${shi.z}${shi.w}`:'') + (ying?`／應爻：${ying.i}爻 ${ying.lq} ${ying.g}${ying.z}${ying.w}`:'');
  // 六爻明細（由上而下）
  let detail = render.oD.slice().reverse().map(o=>{
    let mark=(o.st==='O'?'〇動':o.st==='X'?'╳動':'');
    return `${o.i}爻 ${LS[(render.lsI+(o.i-1))%6]} ${o.lq} ${o.g}${o.z}${o.w}${o.mk?'('+o.mk+')':''}${o.sh?' 世':o.yi?' 應':''}${mark}`;
  }).join('\n');

  let fDate=`${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}`;
  let fMove=moveLineNames.length>0?"動爻":"靜卦";
  currentFilename=`${fDate}_${oG.nm}_${fMove}`;

  currentChart={
    topic:document.getElementById('topic').value,
    gender:document.getElementById('gender').value,
    dateStr, baziStr,
    guaName:oG.nm,
    changedGua:hasM?cG.nm:'',
    moveLineNames,
    hexStructure:oG.nm+(moveLineNames.length>0?" "+moveLineNames.map(n=>n+"動").join("、"):" 靜卦"),
    shiYing, linesDetail:detail,
    filename:currentFilename
  };

  ['btnRead','btnSave','btnCopy','btnDl'].forEach(id=>document.getElementById(id).disabled=false);
  document.getElementById('reading-panel').style.display='none';
  setStatus('排盤完成：'+oG.nm+(hasM?'（'+moveLineNames.join('、')+' 動）':'（靜卦）'));
}

function renderTable(dt,G,Z,ss,oG,cG,pal,raw,oL,cL,hasM,dZ,mZ){
  document.getElementById('capture-area').style.display='block';
  let pad=n=>n<10?'0'+n:n;
  document.getElementById('o-date').innerText=`${dt.getFullYear()}年${pad(dt.getMonth()+1)}月${pad(dt.getDate())}日 ${pad(dt.getHours())}時${pad(dt.getMinutes())}分`;
  document.getElementById('o-gender').innerText=document.getElementById('gender').value;
  document.getElementById('o-topic').innerText=document.getElementById('topic').value;
  ['t','d','m','y'].forEach((k,i)=>{ document.getElementById(`bz-${k}-g`).innerText=G[3-i]; document.getElementById(`bz-${k}-z`).innerText=Z[3-i]; });
  document.getElementById('ss-kong').innerHTML=ss.kong.split('').join('<br>');
  ['ma','hua','gui','ren'].forEach(k=>{ let v=ss[k]; document.getElementById(`ss-${k}`).innerHTML=v.length>1?v.split('').join('<br>'):v; });

  let sTxt=s=>s===6?"六世":(["","一","二","三","四","五"][s]+"世");
  document.getElementById('gn-org').innerText=`${pal.n}${pal.w}${sTxt(oG.sh)}：${oG.nm}`;
  document.getElementById('gn-chg').innerText=hasM?`${BG[cG.pi].n}${BG[cG.pi].w}${sTxt(cG.sh)}：${cG.nm}`:"";

  let tb=document.getElementById('tb-body'); tb.innerHTML="";
  let dG=G[2];
  let lsI="甲乙".includes(dG)?0:"丙丁".includes(dG)?1:dG==="戊"?2:dG==="己"?3:"庚辛".includes(dG)?4:5;

  let build=(g,ln,isC)=>{
    let r=[];
    let zs=[...NZ[g.lo].slice(0,3),...NZ[g.up].slice(3,6)];
    let gs=[NG[g.lo][0],NG[g.lo][0],NG[g.lo][0],NG[g.up][1],NG[g.up][1],NG[g.up][1]];
    let me=WX_SEQ.indexOf(pal.w);
    for(let i=0;i<6;i++){
      let z=zs[i], ga=gs[i], w=WX[z];
      let lq=LQ[(WX_SEQ.indexOf(w)-me+5)%5];
      let st=""; if(!isC && raw.length){ if(raw[i]===6)st="X"; if(raw[i]===9)st="O"; }
      let mk=""; if(ss.kong.includes(z))mk+="空"; if(isClash(z,mZ))mk+="破"; if(isClash(z,dZ))mk+="沖";
      r.push({i:i+1,g:ga,z,w,lq,y:(isC?cL[i]:oL[i])===1,sh:g.sh===i+1,yi:((g.sh+2)%6+1)===i+1,st,mk});
    }
    return r;
  };
  let oD=build(oG,oL,false);
  let cD=build(cG,cL,true);

  let fu={}; let ex=new Set(oD.map(x=>x.lq));
  if(ex.size<5){
    let rtD=build({lo:oG.pi,up:oG.pi,pi:oG.pi,sh:6},[],false);
    LQ.forEach(q=>{ if(!ex.has(q)){ let f=rtD.find(x=>x.lq===q); if(f) fu[f.i-1]=f; }});
  }

  for(let i=5;i>=0;i--){
    let tr=document.createElement('tr');
    let o=oD[i], c=cD[i], f=fu[i];
    tr.innerHTML+=`<td class="td-l">${LS[(lsI+i)%6]}</td><td class="td-c t-gray">${f?f.lq+" "+f.g+f.z+f.w:""}</td>`;
    tr.innerHTML+=`<td class="td-r ${o.sh?'t-red':''}">${o.lq}</td>`;
    tr.innerHTML+=`<td class="td-c"><span class="sy-txt">${o.sh?'世':(o.yi?'應':'')}</span></td>`;
    tr.innerHTML+=`<td class="td-c"><div class="sym-box ${o.y?'bar-yang':'bar-yin'}"></div></td>`;
    tr.innerHTML+=`<td class="td-l t-blue">${o.g}${o.z}${o.w}<span class="t-pink">${o.mk}</span></td>`;
    let arr=""; if(o.st==="O")arr='<span class="move-arrow">O&rarr;</span>'; if(o.st==="X")arr='<span class="move-arrow">X&rarr;</span>';
    tr.innerHTML+=`<td class="td-c">${arr}</td>`;
    if(hasM){
      tr.innerHTML+=`<td class="td-r t-blue">${c.g}${c.z}${c.w}<span class="t-pink">${c.mk}</span></td>`;
      tr.innerHTML+=`<td class="td-c">${c.lq}</td>`;
      tr.innerHTML+=`<td class="td-c"><span class="sy-txt">${c.sh?'世':(c.yi?'應':'')}</span></td>`;
      tr.innerHTML+=`<td class="td-c"><div class="sym-box ${c.y?'bar-yang':'bar-yin'}"></div></td>`;
      tr.innerHTML+=`<td class="td-l">${c.lq}</td>`;
    } else { tr.innerHTML+=`<td></td><td></td><td></td><td></td><td></td>`; }
    tb.appendChild(tr);
  }
  return {oD, cD, lsI};
}

function renderText(oG, ls){
  let box=document.getElementById('text-area');
  let txt=getText(oG.up,oG.lo,0);
  let html=`<div class="text-block"><span class="text-label">本卦卦辭</span><span class="text-content">【${oG.nm}】 ${txt.t}</span>
    <div class="sub-item"><span class="line-head">象曰：</span>${txt.xiang}</div></div>`;
  let moveLines=[]; ls.forEach((v,i)=>{ if(v===6||v===9) moveLines.push({idx:i,v:v}); });
  if(moveLines.length>0){
    html+=`<div class="text-block"><span class="text-label">動爻爻辭</span>`;
    moveLines.forEach(m=>{
      let ln=m.idx+1; let lb=(m.v===9?"九":"六")+["初","二","三","四","五","上"][m.idx];
      if(ln===1)lb=(m.v===9?"初九":"初六"); if(ln===6)lb=(m.v===9?"上九":"上六");
      let lData=getText(oG.up,oG.lo,ln);
      html+=`<div class="text-content" style="margin-top:10px;"><span class="line-head">${lb}：</span>${lData.l.t}</div>`;
      html+=`<div class="sub-item"><span class="line-head">象曰：</span>${lData.l.x}</div>`;
    });
    html+=`</div>`;
  }
  box.innerHTML=html;
}

// ---------- AI 解卦 ----------
function doReading(){
  if(!currentChart) return;
  setStatus('AI 解卦中，請稍候（會帶入講稿與過往校正經驗）…');
  document.getElementById('btnRead').disabled=true;
  call('getReading', currentChart).then(res=>{
    lastPrompt=res.prompt||'';
    document.getElementById('prompt-box').value=lastPrompt;
    document.getElementById('reading-panel').style.display='block';
    if(res.error){
      document.getElementById('reading-box').textContent='⚠️ '+res.error+'\n\n（已生成指令，可用上方「複製 AI 指令」貼到外部 AI。）';
      setStatus(res.error, true);
    } else {
      document.getElementById('reading-box').textContent=res.reading;
      currentChart.reading=res.reading;
      setStatus('解卦完成。確認無誤後可「存到 Google Sheets」。');
    }
  }).catch(e=>{ setStatus('解卦失敗：'+e.message, true); })
  .then(()=>{ document.getElementById('btnRead').disabled=false; });
}

function copyPrompt(){
  var done=function(p){
    lastPrompt=p; document.getElementById('prompt-box').value=p;
    document.getElementById('reading-panel').style.display='block';
    var ta=document.getElementById('prompt-box'); ta.focus(); ta.setSelectionRange(0,99999);
    try{ document.execCommand('copy'); setStatus('✅ AI 指令已複製。'); }
    catch(e){ setStatus('請手動全選複製上方指令。', true); }
  };
  if(lastPrompt){ done(lastPrompt); return; }
  setStatus('生成指令中…');
  call('buildReadingPrompt', currentChart).then(done).catch(e=>setStatus('生成失敗：'+e.message,true));
}

// ---------- 存到 Sheets + 存圖 ----------
function doSave(){
  if(!currentChart){ return; }
  setStatus('產生卦象圖並存檔中…');
  document.getElementById('btnSave').disabled=true;
  captureImage().then(dataUrl=>{
    var payload=Object.assign({}, currentChart, { imageData:dataUrl });
    return call('saveRecord', payload);
  }).then(res=>{
    setStatus('✅ 已存入 Google Sheets（紀錄 '+res.recordId+'）。');
    if(res.sheetUrl) document.getElementById('sheetLink').href=res.sheetUrl;
  }).catch(e=>{ setStatus('存檔失敗：'+e.message, true); })
  .then(()=>{ document.getElementById('btnSave').disabled=false; });
}

function captureImage(){
  var a=document.getElementById('capture-area');
  return html2canvas(a,{scale:2}).then(c=>c.toDataURL('image/png'));
}

function dl(){
  var a=document.getElementById('capture-area'); if(a.style.display==='none') return;
  html2canvas(a,{scale:2}).then(c=>{ var l=document.createElement('a'); l.download=currentFilename+'.png'; l.href=c.toDataURL(); l.click(); });
}

// ---------- 歷史 / 回饋 ----------
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function loadHistory(){
  var box=document.getElementById('hist-list');
  box.innerHTML='<div class="hint">載入中…</div>';
  call('listRecords', 50).then(rows=>{
    if(!rows.length){ box.innerHTML='<div class="hint">還沒有任何紀錄。</div>'; return; }
    box.innerHTML=rows.map(renderCard).join('');
  }).catch(e=>{ box.innerHTML='<div class="hint">載入失敗：'+esc(e.message)+'</div>'; });
}

function renderCard(r){
  var hasOutcome=!!r.outcome;
  var img=r.imageUrl && r.imageUrl.indexOf('http')===0 ? ` ｜ <a href="${esc(r.imageUrl)}" target="_blank">卦象圖 ↗</a>` : '';
  return `<div class="rec-card" id="card-${esc(r.recordId)}">
    <div class="rec-head"><span>${esc(r.topic)}　<span style="color:#0062cc;">${esc(r.gua)}</span> ${esc(r.moveLines)}</span>
      <span class="badge ${hasOutcome?'':'pending'}">${hasOutcome?'已回饋':'待回饋'}</span></div>
    <div class="rec-meta">${esc(r.created)} ｜ ${esc(r.bazi)} ｜ ${esc(r.shiYing)}${img}</div>
    ${r.reading?`<div class="rec-reading">${esc(r.reading)}</div>`:''}
    <div class="fb-grid">
      <textarea id="oc-${esc(r.recordId)}" placeholder="實際發生的事實…">${esc(r.outcome)}</textarea>
      <div>準確度：
        <select id="ac-${esc(r.recordId)}">
          ${[ '', '1','2','3','4','5'].map(v=>`<option ${String(r.accuracy)===v?'selected':''}>${v}</option>`).join('')}
        </select> / 5
      </div>
      <textarea id="cr-${esc(r.recordId)}" placeholder="校正筆記：這次哪裡準、哪裡偏？日後判斷該如何修正？（會自動帶入未來解卦）">${esc(r.correction)}</textarea>
      <div><button class="btn-green" onclick="saveOutcome('${esc(r.recordId)}')">儲存回饋</button></div>
    </div>
  </div>`;
}

function saveOutcome(id){
  var payload={ recordId:id,
    outcome:document.getElementById('oc-'+id).value,
    accuracy:document.getElementById('ac-'+id).value,
    correction:document.getElementById('cr-'+id).value };
  setStatus('儲存回饋中…');
  call('updateOutcome', payload).then(res=>{
    if(res.ok){ setStatus('✅ 回饋已儲存，未來解卦會參考此經驗。'); loadHistory(); }
    else setStatus(res.error||'儲存失敗', true);
  }).catch(e=>setStatus('儲存失敗：'+e.message, true));
}
